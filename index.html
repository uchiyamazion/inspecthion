<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>グラニフリガー 細密点検記録 — SANEI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#f4f2ee;--surface:#fff;--surface2:#f8f7f4;--border:#ddd9d0;--border2:#c8c3b8;--text:#1a1916;--text2:#6b6760;--text3:#9e9a93;--accent:#1a4f8a;--accent-light:#e8eef7;--accent2:#c84b1a;--accent2-light:#fdf0eb;--success:#1a6b3a;--success-light:#e8f5ee;--radius:8px;--radius-lg:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 0 0 .5px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;font-size:14px;background:var(--bg);color:var(--text);min-height:100vh}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--text);color:#fff;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sidebar-header{padding:20px 20px 16px;border-bottom:.5px solid rgba(255,255,255,.12)}
.sidebar-header .logo{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;color:rgba(255,255,255,.45);margin-bottom:6px}
.sidebar-header h1{font-size:15px;font-weight:500;line-height:1.4}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0}
.nav-section{padding:8px 16px 4px;font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.35);font-family:'IBM Plex Mono',monospace}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;color:rgba(255,255,255,.65);cursor:pointer;font-size:13px;transition:all .15s;border-left:2px solid transparent}
.nav-item:hover,.nav-item:active{color:#fff;background:rgba(255,255,255,.1)}
.nav-item.active{color:#fff;border-left-color:#fff;background:rgba(255,255,255,.1)}
.site-nav-item{display:flex;align-items:center;padding:8px 20px 8px 28px;gap:8px;cursor:pointer;color:rgba(255,255,255,.55);font-size:12px;border-left:2px solid transparent}
.site-nav-item:hover,.site-nav-item:active{color:#fff}
.site-nav-item.active{color:#fff;border-left-color:rgba(255,255,255,.5)}
.site-nav-item .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);flex-shrink:0}
.site-nav-item.active .dot{background:#fff}
.sidebar-footer{padding:12px 20px;border-top:.5px solid rgba(255,255,255,.1);font-size:11px;color:rgba(255,255,255,.3);font-family:'IBM Plex Mono',monospace}
.main{margin-left:260px;min-height:100vh;padding:0 0 60px}
.topbar{background:var(--surface);border-bottom:.5px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.topbar h2{font-size:16px;font-weight:500;flex:1}
.content{padding:24px 28px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn:hover,.btn:active{background:var(--surface2)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover,.btn-primary:active{background:#163f6e}
.btn-danger{color:var(--accent2);border-color:#e8c4b8}
.btn-danger:hover,.btn-danger:active{background:var(--accent2-light)}
.btn-sm{padding:5px 12px;font-size:12px}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px}
.card-head{padding:12px 16px;background:var(--surface2);border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.card-head h3{font-size:13px;font-weight:500;flex:1}
.card-head .chevron{font-size:14px;color:var(--text3);transition:transform .2s}
.card-head.collapsed .chevron{transform:rotate(-90deg)}
.card-body{padding:14px 16px}
.card-body.hidden{display:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
label.lbl{font-size:11px;color:var(--text2);font-weight:500;letter-spacing:.03em}
input[type=text],input[type=date],input[type=time],input[type=number],input[type=datetime-local],select,textarea{border:.5px solid var(--border2);border-radius:var(--radius);padding:7px 10px;font-size:13px;font-family:'Noto Sans JP',sans-serif;background:var(--surface);color:var(--text);width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
.check-row{display:grid;grid-template-columns:28px 1fr auto 160px;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--border)}
.check-row:last-child{border-bottom:none}
.check-row.ng{background:#fff8f6}
.check-row .cn{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;text-align:center}
.check-row .cname{font-size:13px}
.check-row.ng .cname{color:var(--accent2);font-weight:500}
.status-group{display:flex;gap:8px;flex-shrink:0}
.radio-lbl{display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;color:var(--text2);white-space:nowrap;-webkit-tap-highlight-color:transparent}
.radio-lbl input[type=radio]{width:auto;accent-color:var(--accent)}
.memo-input{padding:5px 8px;font-size:12px}
.mrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--border)}
.mrow:last-child{border-bottom:none}
.mrow .mno{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;min-width:28px}
.mrow .mname{flex:1;font-size:12px}
.mrow .mval{display:flex;align-items:center;gap:5px;flex-shrink:0}
.mrow .mval input{width:68px;padding:5px 8px;font-size:12px}
.mrow .mmemo{padding:5px 8px;font-size:12px;width:140px}
.unit-lbl{font-size:11px;color:var(--text3);white-space:nowrap}
.ins-row{display:grid;grid-template-columns:28px 1fr 64px 64px 64px 130px;align-items:center;gap:6px;padding:6px 0;border-bottom:.5px solid var(--border);font-size:12px}
.ins-row:last-child{border-bottom:none}
.ins-row input{padding:4px 6px;font-size:12px}
.site-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.site-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow);-webkit-tap-highlight-color:transparent}
.site-card:hover,.site-card:active{border-color:var(--accent)}
.site-card .sc-name{font-size:15px;font-weight:500;margin-bottom:4px}
.site-card .sc-meta{font-size:12px;color:var(--text2);line-height:1.8}
.site-card .sc-footer{margin-top:12px;padding-top:10px;border-top:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
.badge-ok{background:var(--success-light);color:var(--success)}
.badge-ng{background:var(--accent2-light);color:var(--accent2)}
.badge-info{background:var(--accent-light);color:var(--accent)}
.hist-item{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;box-shadow:var(--shadow)}
.hist-item .hi-date{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;white-space:nowrap;color:var(--accent)}
.hist-item .hi-info{flex:1}
.hist-item .hi-model{font-size:12px;color:var(--text2);margin-top:3px}
.hist-item .hi-notes{font-size:12px;color:var(--text2);margin-top:6px;padding-top:6px;border-top:.5px solid var(--border)}
.hist-item .hi-actions{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);border-radius:var(--radius-lg);padding:24px;width:440px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-box h3{font-size:16px;font-weight:500;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 18px;border-radius:var(--radius);font-size:13px;z-index:1000;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty .empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.actions-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:16px;border-top:.5px solid var(--border)}
.section-title{font-size:11px;letter-spacing:.08em;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin:16px 0 8px;text-transform:uppercase}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.75);z-index:800;display:none;align-items:center;justify-content:center;font-size:14px;color:var(--text2);flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--text);color:#fff;border:none;border-radius:var(--radius);padding:8px 10px;font-size:18px;cursor:pointer}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.hamburger{display:block}
  .grid2,.grid3{grid-template-columns:1fr}.content{padding:16px}.topbar{padding:12px 16px;padding-left:52px}
  .check-row{grid-template-columns:24px 1fr auto}.check-row .memo-input{display:none}
  .ins-row{grid-template-columns:24px 1fr 56px 56px 56px}
  .hist-item{flex-direction:column}.hist-item .hi-actions{width:100%}
}
/* ══ 印刷 ══ */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  html,body{margin:0!important;padding:0!important;background:#fff!important}
  .sidebar,.topbar,.hamburger,.actions-bar,.btn,.toast,.modal-overlay,.loading-overlay,.main,.content{display:none!important}
  #print-area{display:block!important;margin:0!important;padding:0!important}
  @page{size:A4 portrait;margin:8mm 10mm}
}
#print-area{display:none}
/* ══ PDF書式（元書式に準拠） ══ */
.pt{font-family:'Noto Sans JP',sans-serif;font-size:7.5pt;color:#000;line-height:1.3}
.pt-title{text-align:center;font-size:11pt;font-weight:700;margin-bottom:1pt}
.pt-subtitle{text-align:center;font-size:7pt;margin-bottom:1pt}
.pt-company{text-align:right;font-size:7pt;margin-bottom:3pt}
/* ヘッダー */
.pt-h{width:100%;border-collapse:collapse;font-size:7.5pt;margin-bottom:4pt}
.pt-h td{border:.5px solid #999;padding:2pt 4pt;vertical-align:middle}
.pt-h .hl{background:#d9d9d9;font-weight:500;white-space:nowrap;width:58pt}
/* セクション見出し */
.pt-sec{font-size:7.5pt;font-weight:700;background:#d9d9d9;padding:2pt 5pt;border:.5px solid #999;margin:4pt 0 0}
/* 点検項目テーブル（左端に縦ラベル） */
.pt-wrap{display:flex;border:.5px solid #999;margin-bottom:0}
.pt-label-col{writing-mode:vertical-rl;text-orientation:mixed;background:#d9d9d9;font-size:7pt;font-weight:700;padding:4pt 2pt;text-align:center;border-right:.5px solid #999;white-space:nowrap;min-width:14pt}
.pt-table{width:100%;border-collapse:collapse;font-size:7pt}
.pt-table th{background:#d9d9d9;border:.5px solid #999;padding:2pt 3pt;font-weight:500;text-align:center}
.pt-table td{border:.5px solid #bbb;padding:2pt 3pt;vertical-align:middle}
.pt-table .tno{text-align:center;width:14pt;color:#555;font-size:6.5pt}
.pt-table .tres{text-align:center;width:28pt}
.pt-ng td{background:#fff0ee}
.pt-ng .tname{color:#c84b1a;font-weight:500}
/* 測定値テーブル */
.pt-mea{width:100%;border-collapse:collapse;font-size:7pt}
.pt-mea td{border:.5px solid #bbb;padding:2pt 4pt;vertical-align:middle}
.pt-mea .ml{background:#f0f0f0;white-space:nowrap;width:auto}
.pt-mea .mv{font-weight:500}
.pt-mea .mm{font-size:6pt;color:#777}
/* 絶縁 */
.pt-ins{width:100%;border-collapse:collapse;font-size:7pt}
.pt-ins th{background:#d9d9d9;border:.5px solid #999;padding:2pt 3pt;font-weight:500;text-align:center}
.pt-ins td{border:.5px solid #bbb;padding:2pt 3pt;text-align:center}
/* 運転状況 */
.pt-op{width:100%;border-collapse:collapse;font-size:6pt}
.pt-op th{background:#d9d9d9;border:.5px solid #999;padding:2pt 2pt;font-weight:500;text-align:center}
.pt-op td{border:.5px solid #bbb;padding:2pt 2pt;text-align:center}
/* フッター */
.pt-foot{display:grid;grid-template-columns:1fr 1fr;gap:3pt;margin-top:4pt}
.pt-sign{border:.5px solid #999;padding:3pt;min-height:28pt;font-size:7pt}
.pt-sign .sl{font-size:6.5pt;color:#555;font-weight:500;margin-bottom:2pt}
.pt-notes{border:.5px solid #999;padding:3pt;min-height:20pt;margin-top:3pt;font-size:7pt;grid-column:1/-1}
</style>
</head>

let sites=[],records={},currentSite=null,editingId=null;

async function api(action,body={}){
  showLoad(true);
  try{
    const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action,...body})});
    const d=await r.json();
    if(d.error){toast('エラー: '+d.error);return null;}
    return d;
  }catch(e){toast('通信エラー: '+e.message);return null;}
  finally{showLoad(false);}
}
function showLoad(v){document.getElementById('loading').classList.toggle('show',v)}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800)}
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}
function closeMobile(){if(window.innerWidth<=768)document.getElementById('sidebar').classList.remove('open')}
function confirm2(t,m,cb){document.getElementById('confirm-title').textContent=t;document.getElementById('confirm-msg').textContent=m;document.getElementById('confirm-ok').onclick=()=>{closeModal('modal-confirm');cb()};openModal('modal-confirm')}
function setTop(title,html=''){document.getElementById('topbar-title').textContent=title;document.getElementById('topbar-actions').innerHTML=html}
function navAct(id){document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));document.getElementById(id)?.classList.add('active');document.querySelectorAll('.site-nav-item').forEach(e=>e.classList.remove('active'))}
function renderSideNav(){document.getElementById('sidebar-sites').innerHTML=sites.map(s=>`<div class="site-nav-item ${currentSite===s.id?'active':''}" onclick="openSite('${s.id}')"><div class="dot"></div><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</span></div>`).join('')||'<div style="padding:6px 28px;font-size:12px;color:rgba(255,255,255,.25)">登録なし</div>'}
function toggleCard(h){h.nextElementSibling.classList.toggle('hidden');h.classList.toggle('collapsed')}

async function gotoPage(page,siteId){
  closeMobile();
  if(page==='home') await renderHome();
  else if(page==='sites') await renderSites();
  else if(page==='settings') renderSettings();
  else if(page==='form') renderForm(siteId);
  else if(page==='history') await renderHistory(siteId);
}

  recent.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).splice(5);

    </div>
    ${sites.length?`<div class="section-title">現場一覧（タップして記録へ）</div>
    <div class="site-grid" style="margin-bottom:20px">${sites.map(s=>{const recs=records[s.id]||[];const ng=recs.flatMap(r=>Object.values(r.checks||{})).filter(v=>v==='abnormal').length;return `<div class="site-card" onclick="openSite('${s.id}')"><div class="sc-name">${s.name}</div><div class="sc-meta">📍 ${s.loc||'所在地未設定'}</div><div class="sc-footer"><span class="badge ${ng>0?'badge-ng':'badge-ok'}">${ng>0?`異常 ${ng}件`:'異常なし'}</span><span style="font-size:12px;color:var(--text2)">${recs.length}件 →</span></div></div>`;}).join('')}</div>`:''}
    <div class="section-title">最近の点検記録</div>
    ${recent.length?recent.map(r=>{const ng=Object.values(r.checks||{}).filter(v=>v==='abnormal').length;return `<div class="hist-item" onclick="openSite('${r.siteId}')" style="cursor:pointer"><div><div class="hi-date">${r.date||'—'}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${r.siteName}</div></div><div class="hi-info"><div style="font-size:13px">担当: ${r.staff||'—'} / 型式: ${r.model||'—'}</div>${ng>0?`<div style="margin-top:4px"><span class="badge badge-ng">異常 ${ng}件</span></div>`:`<div style="margin-top:4px"><span class="badge badge-ok">異常なし</span></div>`}</div></div>`;}).join(''):'<div class="empty"><div class="empty-icon">📋</div><p>まだ記録がありません</p><small>現場を登録して点検記録を追加してください</small></div>'}`;

async function renderSites(){
  navAct('nav-sites');
  const res=await api('getSites');if(!res)return;
  sites=res.sites||[];renderSideNav();
  setTop('現場一覧','<button class="btn btn-primary" onclick="openModal(\'modal-site\')">＋ 新規現場登録</button>');

  if(!sites.length){c.innerHTML='<div class="empty"><div class="empty-icon">🏢</div><p>現場が登録されていません</p></div>';return;}
  c.innerHTML=`<div class="site-grid">${sites.map(s=>{const recs=records[s.id]||[];const ng=recs.flatMap(r=>Object.values(r.checks||{})).filter(v=>v==='abnormal').length;return `<div class="site-card" onclick="openSite('${s.id}')"><div class="sc-name">${s.name}</div><div class="sc-meta">📍 ${s.loc||'所在地未設定'}</div><div class="sc-footer"><span class="badge ${ng>0?'badge-ng':'badge-ok'}">${ng>0?`異常 ${ng}件`:'異常なし'}</span><button class="btn btn-sm btn-danger" onclick="event.stopPropagation();delSite('${s.id}')">削除</button></div></div>`;}).join('')}</div>`;

async function openSite(id){currentSite=id;renderSideNav();await renderHistory(id)}
async function delSite(id){const s=sites.find(x=>x.id===id);confirm2('現場を削除',`「${s.name}」と全記録を削除しますか？`,async()=>{await api('deleteSite',{id});toast('削除しました');await renderSites()})}

async function renderHistory(siteId){
  if(siteId)currentSite=siteId;
  const site=sites.find(s=>s.id===currentSite);
  renderSideNav();
  const res=await api('getRecords',{siteId:currentSite});if(!res)return;
  records[currentSite]=res.records||[];
  const recs=records[currentSite].slice().reverse();
  setTop(site?.name||'',`<button class="btn btn-primary" onclick="startNew()">＋ 新規点検記録</button>`);
  const c=document.getElementById('main-content');
  if(!recs.length){c.innerHTML='<div class="empty"><div class="empty-icon">📋</div><p>点検記録がまだありません</p></div>';return;}
  c.innerHTML=recs.map(r=>{
    const ng=Object.entries(r.checks||{}).filter(([,v])=>v==='abnormal');
    return `<div class="hist-item">
      <div><div class="hi-date">${r.date||'—'}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${r.serial||'—'}</div></div>
      <div class="hi-info">
        <div style="font-size:13px;font-weight:500">${r.model||'型式未入力'}</div>
        <div class="hi-model">担当: ${r.staff||'—'}</div>
        ${ng.length?`<div style="margin-top:4px">${ng.map(([n])=>`<span class="badge badge-ng" style="margin-right:3px;font-size:10px">異常 No.${n}</span>`).join('')}</div>`:`<div style="margin-top:4px"><span class="badge badge-ok">異常なし</span></div>`}
        ${r.notes?`<div class="hi-notes">📝 ${r.notes}</div>`:''}
      </div>
      <div class="hi-actions">
        <button class="btn btn-sm" onclick="doPrint('${r.id}','print')">🖨 印刷</button>
        <button class="btn btn-sm" onclick="doPrint('${r.id}','pdf')">📄 PDF</button>
        <button class="btn btn-sm" onclick="editRec('${r.id}')">編集</button>
        <button class="btn btn-sm btn-danger" onclick="delRec('${r.id}')">削除</button>
      </div>
    </div>`;
  }).join('');
}

function buildChecks(id,items){
  document.getElementById(id).innerHTML=items.map(it=>`
    <div class="check-row" id="row${it.no}">
      <span class="cn">${it.no}</span>
      <span class="cname">${it.name}</span>
      <div class="status-group">
        <label class="radio-lbl"><input type="radio" name="chk${it.no}" value="normal" onchange="rowColor(${it.no})"> 正常</label>
        <label class="radio-lbl"><input type="radio" name="chk${it.no}" value="abnormal" onchange="rowColor(${it.no})"> 異常</label>
        <label class="radio-lbl"><input type="radio" name="chk${it.no}" value="-" checked onchange="rowColor(${it.no})"> —</label>
      </div>
      <input type="text" class="memo-input" id="memo${it.no}" placeholder="メモ">
    </div>`).join('');
}
function rowColor(no){const row=document.getElementById('row'+no);if(!row)return;const v=document.querySelector(`input[name="chk${no}"]:checked`)?.value;row.className='check-row'+(v==='abnormal'?' ng':'');}

function buildVolt(){document.getElementById('volt-body').innerHTML=VOLT.map(it=>{let v='';if(it.triple)v=`<input type="number" id="v${it.no}_1" step="0.1" style="width:56px"><input type="number" id="v${it.no}_2" step="0.1" style="width:56px"><input type="number" id="v${it.no}_3" step="0.1" style="width:56px"><span class="unit-lbl">${it.unit}</span>`;else if(it.rated)v=`<span class="unit-lbl">実測</span><input type="number" id="v${it.no}_m" step="0.1" style="width:60px"><span class="unit-lbl">定格</span><input type="number" id="v${it.no}_r" step="0.1" style="width:60px"><span class="unit-lbl">${it.unit}</span>`;else v=`<input type="number" id="v${it.no}" step="0.1" style="width:72px"><span class="unit-lbl">${it.unit}</span>`;return `<div class="mrow"><span class="mno">${it.no}</span><span class="mname">${it.name}</span><div class="mval">${v}</div><input type="text" class="mmemo" id="vmemo${it.no}" placeholder="メモ"></div>`;}).join('');}

function gatherForm(){
  const checks={},memos={};
  [...ELEC,...MECH,...CTRL].forEach(it=>{const v=document.querySelector(`input[name="chk${it.no}"]:checked`);checks[it.no]=v?v.value:'-';memos[it.no]=document.getElementById('memo'+it.no)?.value||'';});
  const refrig={},rMemos={};
  REFRIG.forEach(it=>{if(it.dual)refrig[it.no]={v1:document.getElementById('r'+it.no+'_1')?.value||'',v2:document.getElementById('r'+it.no+'_2')?.value||''};else if(it.yesno){const v=document.querySelector(`input[name="r${it.no}"]:checked`);refrig[it.no]=v?v.value:'無';}else refrig[it.no]=document.getElementById('r'+it.no)?.value||'';rMemos[it.no]=document.getElementById('rmemo'+it.no)?.value||'';});
  const voltage={},vMemos={};
  VOLT.forEach(it=>{if(it.triple)voltage[it.no]={v1:document.getElementById('v'+it.no+'_1')?.value||'',v2:document.getElementById('v'+it.no+'_2')?.value||'',v3:document.getElementById('v'+it.no+'_3')?.value||''};else if(it.rated)voltage[it.no]={m:document.getElementById('v'+it.no+'_m')?.value||'',r:document.getElementById('v'+it.no+'_r')?.value||''};else voltage[it.no]=document.getElementById('v'+it.no)?.value||'';vMemos[it.no]=document.getElementById('vmemo'+it.no)?.value||'';});
  const ins={},iMemos={};
  INS.forEach(it=>{ins[it.no]={v2:document.getElementById('ins'+it.no+'_2')?.value||'',v4:document.getElementById('ins'+it.no+'_4')?.value||'',v6:document.getElementById('ins'+it.no+'_6')?.value||''};iMemos[it.no]=document.getElementById('insmemo'+it.no)?.value||'';});
  const meas={meas56_dt:document.getElementById('meas56_dt')?.value||'',meas56_wx:document.getElementById('meas56_wx')?.value||'',meas57_1:document.getElementById('meas57_1')?.value||'',meas57_2:document.getElementById('meas57_2')?.value||'',meas57_m:document.getElementById('meas57_m')?.value||'',meas58_1:document.getElementById('meas58_1')?.value||'',meas58_2:document.getElementById('meas58_2')?.value||'',meas58_m:document.getElementById('meas58_m')?.value||'',meas61_pct:document.getElementById('meas61_pct')?.value||'',meas61_out:document.getElementById('meas61_out')?.value||'',meas61_m:document.getElementById('meas61_m')?.value||'',meas62_pct:document.getElementById('meas62_pct')?.value||'',meas62_out:document.getElementById('meas62_out')?.value||'',meas62_m:document.getElementById('meas62_m')?.value||''};
  const ops={};
  OPS.forEach(op=>{ops[op.no]={};['dt','wx','ot','oh','st','ct','out','hp','lp','comp','af','drain','memo'].forEach(k=>{const el=document.getElementById('op'+op.no+'_'+k);if(el)ops[op.no][k]=el.value;});});
  return {id:editingId||Date.now().toString(),date:document.getElementById('f_date')?.value||'',staff:document.getElementById('f_staff')?.value||'',model:document.getElementById('f_model')?.value||'',serial:document.getElementById('f_serial')?.value||'',year:document.getElementById('f_year')?.value||'',drawing:document.getElementById('f_drawing')?.value||'',runtime:document.getElementById('f_runtime')?.value||'',start:document.getElementById('f_start')?.value||'',end:document.getElementById('f_end')?.value||'',notes:document.getElementById('f_notes')?.value||'',checks,memos,refrig,rMemos,voltage,vMemos,ins,iMemos,meas,ops};
}

function loadIntoForm(rid){
  const rec=(records[currentSite]||[]).find(r=>r.id===rid);if(!rec)return;
  ['date','staff','model','serial','year','drawing','runtime','start','end','notes'].forEach(k=>{const el=document.getElementById('f_'+k);if(el)el.value=rec[k]||'';});
  Object.entries(rec.checks||{}).forEach(([no,val])=>{const r=document.querySelector(`input[name="chk${no}"][value="${val}"]`);if(r){r.checked=true;rowColor(parseInt(no));}});
  Object.entries(rec.memos||{}).forEach(([no,val])=>{const el=document.getElementById('memo'+no);if(el)el.value=val;});
  Object.entries(rec.refrig||{}).forEach(([no,val])=>{if(typeof val==='object'&&val.v1!==undefined){const a=document.getElementById('r'+no+'_1');const b=document.getElementById('r'+no+'_2');if(a)a.value=val.v1;if(b)b.value=val.v2;}else if(val==='有'||val==='無'){const r=document.querySelector(`input[name="r${no}"][value="${val}"]`);if(r)r.checked=true;}else{const el=document.getElementById('r'+no);if(el)el.value=val;}});
  Object.entries(rec.rMemos||{}).forEach(([no,val])=>{const el=document.getElementById('rmemo'+no);if(el)el.value=val;});
  Object.entries(rec.voltage||{}).forEach(([no,val])=>{if(typeof val==='object'&&val.v1!==undefined){['1','2','3'].forEach(k=>{const el=document.getElementById('v'+no+'_'+k);if(el)el.value=val['v'+k];});}else if(typeof val==='object'&&val.m!==undefined){['m','r'].forEach(k=>{const el=document.getElementById('v'+no+'_'+k);if(el)el.value=val[k];});}else{const el=document.getElementById('v'+no);if(el)el.value=val;}});
  Object.entries(rec.vMemos||{}).forEach(([no,val])=>{const el=document.getElementById('vmemo'+no);if(el)el.value=val;});
  Object.entries(rec.ins||{}).forEach(([no,val])=>{['2','4','6'].forEach(k=>{const el=document.getElementById('ins'+no+'_'+k);if(el)el.value=val['v'+k]||'';});});
  Object.entries(rec.iMemos||{}).forEach(([no,val])=>{const el=document.getElementById('insmemo'+no);if(el)el.value=val;});
  if(rec.meas){Object.entries(rec.meas).forEach(([k,v])=>{const el=document.getElementById(k);if(el)el.value=v;});}
  Object.entries(rec.ops||{}).forEach(([no,op])=>{Object.entries(op).forEach(([k,v])=>{const el=document.getElementById('op'+no+'_'+k);if(el)el.value=v;});});
}

async function saveRec(){
  const date=document.getElementById('f_date')?.value;if(!date){toast('⚠ 点検実施日を入力してください');return;}
  const rec=gatherForm();
  const res=await api('saveRecord',{siteId:currentSite,record:rec});if(!res)return;
  editingId=null;toast('✓ 保存しました');
  setTimeout(()=>renderHistory(currentSite),600);
}

  if(mode==='pdf'){
    const hint=document.createElement('div');
    hint.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1a4f8a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999';
    hint.textContent='印刷画面で「PDFに保存」を選択してください';
    document.body.appendChild(hint);
    setTimeout(()=>{window.print();setTimeout(()=>hint.remove(),1500);},300);
  } else {
    window.print();
  }
}

async function addSite(){
  const name=document.getElementById('ns-name').value.trim();if(!name){alert('現場名を入力してください');return;}
  const res=await api('addSite',{name,loc:document.getElementById('ns-loc').value,memo:document.getElementById('ns-memo').value});if(!res)return;
  closeModal('modal-site');['ns-name','ns-loc','ns-memo'].forEach(id=>document.getElementById(id).value='');
  toast('✓ 現場を登録しました');
  const sres=await api('getSites');if(!sres)return;
  sites=sres.sites||[];renderSideNav();openSite(res.id);
}

// 起動
gotoPage('home');
