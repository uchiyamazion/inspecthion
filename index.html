<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グラニフリガー 細密点検記録 — SANEI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{--bg:#f4f2ee;--surface:#fff;--surface2:#f8f7f4;--border:#ddd9d0;--border2:#c8c3b8;--text:#1a1916;--text2:#6b6760;--text3:#9e9a93;--accent:#1a4f8a;--accent-light:#e8eef7;--accent2:#c84b1a;--accent2-light:#fdf0eb;--success:#1a6b3a;--success-light:#e8f5ee;--radius:8px;--radius-lg:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 0 0 .5px rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;font-size:14px;background:var(--bg);color:var(--text);min-height:100vh}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;background:var(--text);color:#fff;display:flex;flex-direction:column;z-index:100;transition:transform .3s}
.sidebar-header{padding:20px 20px 16px;border-bottom:.5px solid rgba(255,255,255,.12)}
.sidebar-header .logo{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;color:rgba(255,255,255,.45);margin-bottom:6px}
.sidebar-header h1{font-size:15px;font-weight:500;line-height:1.4}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0}
.nav-section{padding:8px 16px 4px;font-size:10px;letter-spacing:.1em;color:rgba(255,255,255,.35);font-family:'IBM Plex Mono',monospace}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;color:rgba(255,255,255,.65);cursor:pointer;font-size:13px;transition:all .15s;border-left:2px solid transparent}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.06)}
.nav-item.active{color:#fff;border-left-color:#fff;background:rgba(255,255,255,.1)}
.site-nav-item{display:flex;align-items:center;padding:8px 20px 8px 28px;gap:8px;cursor:pointer;color:rgba(255,255,255,.55);font-size:12px;transition:all .15s;border-left:2px solid transparent}
.site-nav-item:hover{color:rgba(255,255,255,.9)}
.site-nav-item.active{color:#fff;border-left-color:rgba(255,255,255,.5)}
.site-nav-item .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);flex-shrink:0}
.site-nav-item.active .dot{background:#fff}
.sidebar-footer{padding:12px 20px;border-top:.5px solid rgba(255,255,255,.1);font-size:11px;color:rgba(255,255,255,.3);font-family:'IBM Plex Mono',monospace}
.main{margin-left:260px;min-height:100vh;padding:0 0 60px}
.topbar{background:var(--surface);border-bottom:.5px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.topbar h2{font-size:16px;font-weight:500;flex:1}
.content{padding:24px 28px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#163f6e}
.btn-danger{color:var(--accent2);border-color:#e8c4b8}
.btn-danger:hover{background:var(--accent2-light)}
.btn-sm{padding:5px 12px;font-size:12px}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px}
.card-head{padding:12px 16px;background:var(--surface2);border-bottom:.5px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.card-head h3{font-size:13px;font-weight:500;flex:1}
.card-head .chevron{font-size:14px;color:var(--text3);transition:transform .2s}
.card-head.collapsed .chevron{transform:rotate(-90deg)}
.card-body{padding:14px 16px}
.card-body.hidden{display:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
label.lbl{font-size:11px;color:var(--text2);font-weight:500;letter-spacing:.03em}
input[type=text],input[type=date],input[type=time],input[type=number],input[type=datetime-local],select,textarea{border:.5px solid var(--border2);border-radius:var(--radius);padding:7px 10px;font-size:13px;font-family:'Noto Sans JP',sans-serif;background:var(--surface);color:var(--text);width:100%;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,79,138,.12)}
textarea{resize:vertical;min-height:60px}
/* check rows */
.check-row{display:grid;grid-template-columns:32px 1fr auto auto;align-items:center;gap:8px;padding:8px 0;border-bottom:.5px solid var(--border)}
.check-row:last-child{border-bottom:none}
.check-row.ng{background:#fff8f6}
.check-row .cn{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;text-align:center}
.check-row .cname{font-size:13px}
.check-row.ng .cname{color:var(--accent2);font-weight:500}
.status-group{display:flex;gap:10px;flex-shrink:0}
.radio-lbl{display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;color:var(--text2);white-space:nowrap}
.radio-lbl input[type=radio]{width:auto;accent-color:var(--accent)}
.memo-input{width:180px;padding:5px 8px;font-size:12px}
/* measure rows */
.mrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--border)}
.mrow:last-child{border-bottom:none}
.mrow .mno{font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;min-width:28px}
.mrow .mname{flex:1;font-size:12px}
.mrow .mval{display:flex;align-items:center;gap:6px;flex-shrink:0}
.mrow .mval input{width:72px;padding:5px 8px;font-size:12px}
.mrow .mmemo{width:160px;padding:5px 8px;font-size:12px}
.unit-lbl{font-size:11px;color:var(--text3);white-space:nowrap}
/* insulation rows */
.ins-row{display:grid;grid-template-columns:32px 1fr 70px 70px 70px 160px;align-items:center;gap:6px;padding:7px 0;border-bottom:.5px solid var(--border);font-size:12px}
.ins-row:last-child{border-bottom:none}
.ins-row .ihead{font-weight:500;font-size:11px;color:var(--text2)}
.ins-row input{padding:4px 6px;font-size:12px}
/* site / history */
.site-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.site-card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.site-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.site-card .sc-name{font-size:15px;font-weight:500;margin-bottom:4px}
.site-card .sc-meta{font-size:12px;color:var(--text2);line-height:1.8}
.site-card .sc-footer{margin-top:12px;padding-top:10px;border-top:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
.badge-ok{background:var(--success-light);color:var(--success)}
.badge-ng{background:var(--accent2-light);color:var(--accent2)}
.badge-info{background:var(--accent-light);color:var(--accent)}
.hist-item{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;box-shadow:var(--shadow)}
.hist-item .hi-date{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;white-space:nowrap;color:var(--accent)}
.hist-item .hi-info{flex:1}
.hist-item .hi-model{font-size:12px;color:var(--text2);margin-top:3px}
.hist-item .hi-notes{font-size:12px;color:var(--text2);margin-top:6px;padding-top:6px;border-top:.5px solid var(--border)}
.hist-item .hi-actions{display:flex;gap:6px;flex-shrink:0}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:var(--surface);border-radius:var(--radius-lg);padding:24px;width:440px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-box h3{font-size:16px;font-weight:500;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 18px;border-radius:var(--radius);font-size:13px;z-index:1000;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty .empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.actions-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:16px;border-top:.5px solid var(--border)}
.section-title{font-size:11px;letter-spacing:.08em;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin:16px 0 8px;text-transform:uppercase}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:800;display:none;align-items:center;justify-content:center;font-size:14px;color:var(--text2)}
.loading-overlay.show{display:flex}
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--text);color:#fff;border:none;border-radius:var(--radius);padding:8px 10px;font-size:18px;cursor:pointer}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.hamburger{display:block}
  .grid2,.grid3{grid-template-columns:1fr}.content{padding:16px}.topbar{padding:12px 16px;padding-left:52px}
  .check-row{grid-template-columns:24px 1fr}.check-row .status-group{flex-wrap:wrap}.memo-input{width:120px}
  .ins-row{grid-template-columns:24px 1fr 60px 60px 60px}
}

/* ══════════════════════════════════════
   PDF印刷スタイル
══════════════════════════════════════ */
@media print{
  body,html{margin:0;padding:0;background:#fff}
  .sidebar,.topbar,.hamburger,.actions-bar,.btn,.toast,.modal-overlay,.loading-overlay{display:none!important}
  .main{margin-left:0!important;padding:0!important}
  .content{padding:0!important;display:none!important}
  #print-area{display:block!important}
  @page{size:A4 portrait;margin:8mm 10mm}
  .page-break{page-break-before:always}
}
#print-area{display:none}

.pdf{font-family:'Noto Sans JP',sans-serif;font-size:8.5pt;color:#000;line-height:1.35;background:#fff}
.pdf-outer-border{border:1.5px solid #000;padding:6pt}
.pdf-title{text-align:center;font-size:12pt;font-weight:700;letter-spacing:.05em;margin-bottom:2pt}
.pdf-subtitle{text-align:center;font-size:8pt;color:#333;margin-bottom:4pt}
.pdf-company{text-align:right;font-size:8pt;margin-bottom:4pt}
.pdf-header-table{width:100%;border-collapse:collapse;margin-bottom:5pt;font-size:8pt}
.pdf-header-table td{border:.5px solid #666;padding:2pt 4pt;vertical-align:middle}
.pdf-header-table .lh{background:#e8e8e8;font-weight:500;width:70pt;white-space:nowrap}
.pdf-section{font-size:8pt;font-weight:700;background:#333;color:#fff;padding:2pt 5pt;margin:5pt 0 0}
.pdf-check-table{width:100%;border-collapse:collapse;font-size:7.5pt}
.pdf-check-table th{background:#d0d0d0;border:.5px solid #888;padding:2pt 3pt;font-weight:500;text-align:center}
.pdf-check-table td{border:.5px solid #bbb;padding:2pt 3pt;vertical-align:top}
.pdf-check-table .td-no{text-align:center;width:18pt;color:#555;font-size:7pt}
.pdf-check-table .td-name{width:auto}
.pdf-check-table .td-result{text-align:center;width:36pt}
.pdf-check-table .td-memo{width:auto}
.pdf-ng{background:#fff0ee}
.pdf-ng .td-name{color:#c84b1a;font-weight:500}
.pdf-measure-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2pt;margin-bottom:3pt;font-size:7.5pt}
.pdf-measure-item{border:.5px solid #bbb;padding:2pt 4pt}
.pdf-measure-item .pml{font-size:6.5pt;color:#555}
.pdf-measure-item .pmv{font-weight:500;margin-top:1pt}
.pdf-ins-table{width:100%;border-collapse:collapse;font-size:7pt}
.pdf-ins-table th{background:#d0d0d0;border:.5px solid #888;padding:2pt 3pt;font-weight:500;text-align:center}
.pdf-ins-table td{border:.5px solid #bbb;padding:2pt 3pt;text-align:center;vertical-align:middle}
.pdf-op-table{width:100%;border-collapse:collapse;font-size:6.5pt}
.pdf-op-table th{background:#d0d0d0;border:.5px solid #888;padding:2pt 3pt;font-weight:500;text-align:center}
.pdf-op-table td{border:.5px solid #bbb;padding:2pt 3pt;text-align:center}
.pdf-footer-grid{display:grid;grid-template-columns:1fr 1fr;gap:4pt;margin-top:4pt;font-size:7.5pt}
.pdf-sign-box{border:.5px solid #666;padding:4pt;min-height:36pt}
.pdf-sign-box .psl{font-size:7pt;color:#555;margin-bottom:3pt;font-weight:500}
.pdf-notes-full{border:.5px solid #666;padding:4pt;min-height:28pt;margin-top:4pt;font-size:7.5pt;grid-column:1/-1}
</style>
</head>

// ═══ STATE ═══
let sites=[], records={}, currentSite=null, editingId=null;

// ═══ API ═══
async function api(action, body={}) {
  if (!GAS_URL) { toast('⚠ GAS URLが設定されていません'); return null; }
  showLoading(true);
  try {
    const res = await fetch(GAS_URL, {method:'POST', body:JSON.stringify({action,...body})});
    const data = await res.json();
    if (data.error) { toast('エラー: '+data.error); return null; }
    return data;
  } catch(e) { toast('通信エラー: '+e.message); return null; }
  finally { showLoading(false); }
}
function showLoading(v){document.getElementById('loading').classList.toggle('show',v)}

// ═══ UI ═══
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800)}
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}
function closeSidebarIfMobile(){if(window.innerWidth<=768)document.getElementById('sidebar').classList.remove('open')}
function confirm2(title,msg,cb){document.getElementById('confirm-title').textContent=title;document.getElementById('confirm-msg').textContent=msg;document.getElementById('confirm-ok').onclick=()=>{closeModal('modal-confirm');cb()};openModal('modal-confirm')}
function setTopbar(title,html=''){document.getElementById('topbar-title').textContent=title;document.getElementById('topbar-actions').innerHTML=html}
function navActive(id){document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));const el=document.getElementById(id);if(el)el.classList.add('active');document.querySelectorAll('.site-nav-item').forEach(el=>el.classList.remove('active'))}
function renderSidebarSites(){document.getElementById('sidebar-sites').innerHTML=sites.map(s=>`<div class="site-nav-item ${currentSite===s.id?'active':''}" onclick="openSite('${s.id}')"><div class="dot"></div><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</span></div>`).join('')||'<div style="padding:6px 28px;font-size:12px;color:rgba(255,255,255,.25)">登録なし</div>'}

async function showPage(page,siteId){
  closeSidebarIfMobile();

  else if(page==='settings') renderSettings();
  else if(page==='form') renderFormPage(siteId);
  else if(page==='history') await renderHistoryPage(siteId);
}

      <div class="card" style="padding:16px 20px;cursor:default;${ngCount>0?'border-color:#e8c4b8':''}"><div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-family:'IBM Plex Mono',monospace">ABNORMAL</div><div style="font-size:28px;font-weight:700;color:${ngCount>0?'var(--accent2)':'var(--success)'}">${ngCount}</div><div style="font-size:12px;color:var(--text2)">異常検出件数（累計）</div></div>

function gatherForm(){
  const checks={},memos={};
  [...ELEC_ITEMS,...MECH_ITEMS].forEach(it=>{
    const v=document.querySelector(`input[name="chk${it.no}"]:checked`);
    checks[it.no]=v?v.value:'-';
    memos[it.no]=document.getElementById('memo'+it.no)?.value||'';
  });
  const refrig={},refrigMemos={};
  REFRIG_ITEMS.forEach(it=>{
    if(it.dual) refrig[it.no]={v1:document.getElementById('r'+it.no+'_1')?.value||'',v2:document.getElementById('r'+it.no+'_2')?.value||''};
    else if(it.yesno){const v=document.querySelector(`input[name="r${it.no}"]:checked`);refrig[it.no]=v?v.value:'無';}
    else refrig[it.no]=document.getElementById('r'+it.no)?.value||'';
    refrigMemos[it.no]=document.getElementById('rmemo'+it.no)?.value||'';
  });
  const voltage={},voltMemos={};
  VOLT_ITEMS.forEach(it=>{
    if(it.triple) voltage[it.no]={v1:document.getElementById('v'+it.no+'_1')?.value||'',v2:document.getElementById('v'+it.no+'_2')?.value||'',v3:document.getElementById('v'+it.no+'_3')?.value||''};
    else if(it.rated) voltage[it.no]={m:document.getElementById('v'+it.no+'_m')?.value||'',r:document.getElementById('v'+it.no+'_r')?.value||''};
    else voltage[it.no]=document.getElementById('v'+it.no)?.value||'';
    voltMemos[it.no]=document.getElementById('vmemo'+it.no)?.value||'';
  });
  const insulation={},insMemos={};
  INS_ITEMS.forEach(it=>{
    insulation[it.no]={v2:document.getElementById('ins'+it.no+'_2')?.value||'',v4:document.getElementById('ins'+it.no+'_4')?.value||'',v6:document.getElementById('ins'+it.no+'_6')?.value||''};
    insMemos[it.no]=document.getElementById('insmemo'+it.no)?.value||'';
  });
  const ops={};
  OP_CONDITIONS.forEach(op=>{
    ops[op.no]={};
    ['dt','wx','ot','oh','st','ct','out','hp','lp','comp','af','drain','memo'].forEach(k=>{const el=document.getElementById('op'+op.no+'_'+k);if(el)ops[op.no][k]=el.value;});
  });
  return {id:editingId||Date.now().toString(),date:document.getElementById('f_date')?.value||'',staff:document.getElementById('f_staff')?.value||'',model:document.getElementById('f_model')?.value||'',serial:document.getElementById('f_serial')?.value||'',year:document.getElementById('f_year')?.value||'',drawing:document.getElementById('f_drawing')?.value||'',runtime:document.getElementById('f_runtime')?.value||'',start:document.getElementById('f_start')?.value||'',end:document.getElementById('f_end')?.value||'',notes:document.getElementById('f_notes')?.value||'',checks,memos,refrig,refrigMemos,voltage,voltMemos,insulation,insMemos,ops};
}

function loadRecordIntoForm(rid){
  const rec=(records[currentSite]||[]).find(r=>r.id===rid); if(!rec) return;
  ['date','staff','model','serial','year','drawing','runtime','start','end','notes'].forEach(k=>{const el=document.getElementById('f_'+k);if(el)el.value=rec[k]||'';});
  Object.entries(rec.checks||{}).forEach(([no,val])=>{const r=document.querySelector(`input[name="chk${no}"][value="${val}"]`);if(r){r.checked=true;updateRowColor(parseInt(no));}});
  Object.entries(rec.memos||{}).forEach(([no,val])=>{const el=document.getElementById('memo'+no);if(el)el.value=val;});
  Object.entries(rec.refrig||{}).forEach(([no,val])=>{
    if(typeof val==='object'&&val.v1!==undefined){const a=document.getElementById('r'+no+'_1');const b=document.getElementById('r'+no+'_2');if(a)a.value=val.v1;if(b)b.value=val.v2;}
    else if(val==='有'||val==='無'){const r=document.querySelector(`input[name="r${no}"][value="${val}"]`);if(r)r.checked=true;}
    else{const el=document.getElementById('r'+no);if(el)el.value=val;}
  });
  Object.entries(rec.refrigMemos||{}).forEach(([no,val])=>{const el=document.getElementById('rmemo'+no);if(el)el.value=val;});
  Object.entries(rec.voltage||{}).forEach(([no,val])=>{
    if(typeof val==='object'&&val.v1!==undefined){['1','2','3'].forEach(k=>{const el=document.getElementById('v'+no+'_'+k);if(el)el.value=val['v'+k];});}
    else if(typeof val==='object'&&val.m!==undefined){['m','r'].forEach(k=>{const el=document.getElementById('v'+no+'_'+k);if(el)el.value=val[k];});}
    else{const el=document.getElementById('v'+no);if(el)el.value=val;}
  });
  Object.entries(rec.voltMemos||{}).forEach(([no,val])=>{const el=document.getElementById('vmemo'+no);if(el)el.value=val;});
  Object.entries(rec.insulation||{}).forEach(([no,val])=>{
    ['2','4','6'].forEach(k=>{const el=document.getElementById('ins'+no+'_'+k);if(el)el.value=val['v'+k]||'';});
  });
  Object.entries(rec.insMemos||{}).forEach(([no,val])=>{const el=document.getElementById('insmemo'+no);if(el)el.value=val;});
  Object.entries(rec.ops||{}).forEach(([no,op])=>{Object.entries(op).forEach(([k,v])=>{const el=document.getElementById('op'+no+'_'+k);if(el)el.value=v;});});
}

async function saveRecord(){
  const date=document.getElementById('f_date')?.value;
  if(!date){toast('⚠ 点検実施日を入力してください');return;}
  const rec=gatherForm();
  const res=await api('saveRecord',{siteId:currentSite,record:rec}); if(!res) return;
  editingId=null; toast('✓ 保存しました');
  setTimeout(()=>renderHistoryPage(currentSite),600);
}

function exportCSV(){
  const rec=gatherForm();
  const site=sites.find(s=>s.id===currentSite);
  let csv='項目No.,点検項目,結果,メモ\n';
  [...ELEC_ITEMS,...MECH_ITEMS].forEach(it=>{ csv+=`${it.no},"${it.name}","${rec.checks[it.no]||'—'}","${rec.memos[it.no]||''}"\n`; });
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`点検記録_${site?.name||''}_${rec.date||'日付未定'}.csv`; a.click();
  toast('📥 CSVエクスポート完了');
}

// ═══ PDF PRINT ═══
function printRecord(rid){
  const rec=(records[currentSite]||[]).find(r=>r.id===rid); if(!rec) return;
  const site=sites.find(s=>s.id===currentSite);
  const allItems=[...ELEC_ITEMS,...MECH_ITEMS];

  // 点検項目表
  const checkRows=allItems.map(it=>{
    const v=rec.checks[it.no]||'-';
    const isNg=v==='abnormal';
    const memo=rec.memos?.[it.no]||'';
    return `<tr class="${isNg?'pdf-ng':''}"><td class="td-no">${it.no}</td><td class="td-name">${it.name}</td><td class="td-result" style="text-align:center">${isNg?'<b style="color:#c84b1a">異常</b>':v==='normal'?'正常':'—'}</td><td class="td-memo">${memo}</td></tr>`;
  }).join('');

  // 冷凍回路
  const refrigRows=REFRIG_ITEMS.map(it=>{
    const v=rec.refrig?.[it.no]; const memo=rec.refrigMemos?.[it.no]||'';
    let val='—';
    if(it.dual) val=`${v?.v1||'—'} / ${v?.v2||'—'} ${it.unit}`;
    else if(it.yesno) val=v||'無';
    else if(v) val=`${v} ${it.unit}`;
    return `<div class="pdf-measure-item"><div class="pml">No.${it.no} ${it.name}</div><div class="pmv">${val}</div>${memo?`<div style="font-size:6pt;color:#888;margin-top:1pt">${memo}</div>`:''}</div>`;
  }).join('');

  // 電圧・電流
  const voltRows=VOLT_ITEMS.map(it=>{
    const v=rec.voltage?.[it.no]; const memo=rec.voltMemos?.[it.no]||'';
    let val='—';
    if(it.triple) val=`${v?.v1||'—'} / ${v?.v2||'—'} / ${v?.v3||'—'} ${it.unit}`;
    else if(it.rated) val=`実測:${v?.m||'—'} 定格:${v?.r||'—'} ${it.unit}`;
    else if(v) val=`${v} ${it.unit}`;
    return `<div class="pdf-measure-item"><div class="pml">No.${it.no} ${it.name}</div><div class="pmv">${val}</div>${memo?`<div style="font-size:6pt;color:#888;margin-top:1pt">${memo}</div>`:''}</div>`;
  }).join('');

  // 絶縁測定値
  const insRows=INS_ITEMS.map(it=>{
    const v=rec.insulation?.[it.no]||{}; const memo=rec.insMemos?.[it.no]||'';
    return `<tr><td style="text-align:left;padding:2pt 4pt">${it.no}</td><td style="text-align:left;padding:2pt 4pt">${it.name}</td><td>${v.v2||'—'}</td><td>${v.v4||'—'}</td><td>${v.v6||'—'}</td><td style="text-align:left;font-size:6.5pt">${memo}</td></tr>`;
  }).join('');

  // 運転状況
  const opRows=OP_CONDITIONS.map(op=>{
    const o=rec.ops?.[op.no]||{};
    return `<tr><td style="text-align:left;padding:2pt 3pt;font-size:6pt">${op.label}</td><td>${o.dt||'—'}</td><td>${o.wx||'—'}</td><td>${o.ot||'—'}</td><td>${o.oh||'—'}</td><td>${o.st||'—'}</td><td>${o.ct||'—'}</td><td>${o.out||'—'}</td><td>${o.hp||'—'}</td><td>${o.lp||'—'}</td><td>${o.comp?o.comp+'%':'—'}</td><td style="text-align:left;font-size:6pt">${o.memo||''}</td></tr>`;
  }).join('');

  document.getElementById('print-area').innerHTML=`
<div class="pdf">
<div class="pdf-outer-border">
  <div class="pdf-title">穀物冷却装置グラニフリガー 細密点検記録表</div>
  <div class="pdf-subtitle">GRANIFRIGOR® Grain Cooler &amp; Grain Cooling System</div>
  <div class="pdf-company">SANEI 株式会社サンエー</div>

  <table class="pdf-header-table">
    <tr>
      <td class="lh">お客様名</td><td colspan="3">${site?.name||''} 殿</td>
      <td class="lh">点検実施日</td><td>${rec.date||''}</td>
    </tr>
    <tr>
      <td class="lh">所在地</td><td colspan="3">${site?.loc||''}</td>
      <td class="lh">担当者</td><td>${rec.staff||''}</td>
    </tr>
    <tr>
      <td class="lh">機械型式</td><td>${rec.model||''}</td>
      <td class="lh">製造No.</td><td>${rec.serial||''}</td>
      <td class="lh">製造年</td><td>${rec.year||''}</td>
    </tr>
    <tr>
      <td class="lh">図番</td><td>${rec.drawing||''}</td>
      <td class="lh">運転時間積算値</td><td colspan="3">${rec.runtime||''} 時間</td>
    </tr>
  </table>

  <!-- 点検項目 -->
  <div class="pdf-section">■ 電気系・機械系 点検項目</div>
  <table class="pdf-check-table">
    <thead><tr><th style="width:18pt">No.</th><th>点検項目</th><th style="width:36pt">結果</th><th>メモ・対応内容</th></tr></thead>
    <tbody>${checkRows}</tbody>
  </table>

  <!-- 冷凍回路 -->
  <div class="pdf-section">■ 冷凍回路 測定値 (No.32〜41)</div>
  <div class="pdf-measure-grid">${refrigRows}</div>

  <!-- 電圧電流 -->
  <div class="pdf-section">■ 電源電圧・電流値 (No.63〜77)</div>
  <div class="pdf-measure-grid">${voltRows}</div>

  <!-- 絶縁 -->
  <div class="pdf-section">■ 絶縁測定値 (No.78〜88)</div>
  <table class="pdf-ins-table">
    <thead><tr><th style="width:18pt">No.</th><th style="text-align:left">測定箇所</th><th style="width:44pt">2MΩ</th><th style="width:44pt">4MΩ</th><th style="width:44pt">6MΩ</th><th>メモ</th></tr></thead>
    <tbody>${insRows}</tbody>
  </table>

  <!-- 運転状況 -->
  <div class="pdf-section">■ 運転状況記録 (No.51〜54)</div>
  <table class="pdf-op-table">
    <thead><tr><th>条件</th><th>日時</th><th>天候</th><th>外気温℃</th><th>湿度%</th><th>設定温度℃</th><th>制御温度℃</th><th>出側℃</th><th>高圧bar</th><th>低圧bar</th><th>コンプ%</th><th>メモ</th></tr></thead>
    <tbody>${opRows}</tbody>
  </table>

  <!-- フッター -->
  <div class="pdf-footer-grid">
    <div class="pdf-sign-box">
      <div class="psl">作業時間</div>
      <div style="margin-top:4pt">${rec.start||'—'} 〜 ${rec.end||'—'}</div>
    </div>
    <div class="pdf-sign-box">
      <div class="psl">お客様確認サイン</div>
    </div>
    <div class="pdf-notes-full">
      <div class="psl">特記事項</div>
      <div style="margin-top:4pt">${rec.notes||''}</div>
    </div>
  </div>
  <div style="margin-top:4pt;font-size:6.5pt;color:#999;text-align:right">ver. 20250610 / www.silo.jp</div>
</div>
</div>`;
  window.print();
}

async function addSite(){
  const name=document.getElementById('ns-name').value.trim();
  if(!name){alert('現場名を入力してください');return;}
  const res=await api('addSite',{name,loc:document.getElementById('ns-loc').value,memo:document.getElementById('ns-memo').value}); if(!res) return;
  closeModal('modal-site');
  ['ns-name','ns-loc','ns-memo'].forEach(id=>document.getElementById(id).value='');
  toast('✓ 現場を登録しました');
  const sres=await api('getSites'); if(!sres) return;
  sites=sres.sites||[]; renderSidebarSites();
  openSite(res.id);
}
